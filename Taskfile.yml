version: '3'

vars:
  APP_NAME: Julia
  SCHEME: Julia
  PROJECT: Julia.xcodeproj
  BUILD_DIR: build
  BUILT_APP: '{{.BUILD_DIR}}/Build/Products/Debug/{{.APP_NAME}}.app'
  INSTALLED_APP: /Applications/{{.APP_NAME}}.app

tasks:
  default:
    desc: Build, install to /Applications, and launch
    cmds:
      - task: run

  build:
    desc: Build the app to ./build (separate from Xcode's DerivedData)
    cmds:
      - |
        set -o pipefail
        xcodebuild -project {{.PROJECT}} -scheme {{.SCHEME}} -configuration Debug -derivedDataPath {{.BUILD_DIR}} build | xcbeautify
    sources:
      - Julia/**/*
      - Julia.xcodeproj/project.pbxproj
    generates:
      - '{{.BUILT_APP}}/Contents/MacOS/{{.APP_NAME}}'

  install:
    desc: Build and copy app to /Applications
    deps: [build]
    cmds:
      - rm -rf {{.INSTALLED_APP}}
      - ditto {{.BUILT_APP}} {{.INSTALLED_APP}}

  run:
    desc: Build, install, and launch the app
    deps: [install]
    cmds:
      - pkill -9 {{.APP_NAME}} 2>/dev/null || true
      - sleep 1
      - open {{.INSTALLED_APP}}

  release:
    desc: Build, notarize, and zip a Developer ID-signed app for distribution
    vars:
      RELEASE_APP: '{{.BUILD_DIR}}/Build/Products/Release/{{.APP_NAME}}.app'
      RELEASE_ZIP: '{{.BUILD_DIR}}/{{.APP_NAME}}.zip'
      TEAM_ID: C3QVT95G54
      # One-time setup: xcrun notarytool store-credentials julia-notary
      #   --apple-id <you> --team-id C3QVT95G54 --password <app-specific pw>
      NOTARY_PROFILE: julia-notary
    cmds:
      # Debug builds keep the Apple Development identity; only releases use
      # Developer ID + hardened runtime (required for notarization).
      - |
        set -o pipefail
        xcodebuild -project {{.PROJECT}} -scheme {{.SCHEME}} -configuration Release -derivedDataPath {{.BUILD_DIR}} \
          CODE_SIGN_STYLE=Manual \
          CODE_SIGN_IDENTITY="Developer ID Application" \
          DEVELOPMENT_TEAM={{.TEAM_ID}} \
          ENABLE_HARDENED_RUNTIME=YES \
          CODE_SIGN_INJECT_BASE_ENTITLEMENTS=NO \
          OTHER_CODE_SIGN_FLAGS=--timestamp \
          build | xcbeautify
      - ditto -c -k --keepParent {{.RELEASE_APP}} {{.RELEASE_ZIP}}
      - xcrun notarytool submit {{.RELEASE_ZIP}} --keychain-profile {{.NOTARY_PROFILE}} --wait
      # Staple the ticket so the app verifies offline, then re-zip.
      - xcrun stapler staple {{.RELEASE_APP}}
      - ditto -c -k --keepParent {{.RELEASE_APP}} {{.RELEASE_ZIP}}
      - echo "Created notarized {{.RELEASE_ZIP}}"

  clean:
    desc: Remove local build artifacts
    cmds:
      - rm -rf {{.BUILD_DIR}}
